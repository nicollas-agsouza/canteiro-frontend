<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3d5a3e" />
  <meta name="description" content="Diário minimalista para cuidar das suas plantas." />
  <link rel="manifest" href="manifest.json" />
  <!-- <link rel="icon" href="icons/icon-192x192.png" /> -->
   <!-- index.html -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Canteiro</title>
</head>
<body>

  <div class="wrap">

    <!-- Cabeçalho -->
    <header class="site-header">
      <div>
        <h1>Can<em>teiro</em></h1>
        <p>seu diário de plantas</p>
      </div>
    </header>

    <!-- Barra de estatísticas -->
    <div class="stats-bar">
      <div class="stat-cell">
        <div class="num" id="st-total">—</div>
        <div class="lbl">plantas</div>
      </div>
      <div class="stat-cell">
        <div class="num" id="st-healthy">—</div>
        <div class="lbl">saudáveis</div>
      </div>
      <div class="stat-cell">
        <div class="num" id="st-water">—</div>
        <div class="lbl">precisam de rega</div>
      </div>
      <div class="stat-cell">
        <div class="num" id="st-locations">—</div>
        <div class="lbl">ambientes</div>
      </div>
    </div>

    <!-- Grid principal -->
    <div class="layout">

      <!-- Painel lateral: formulário -->
      <aside>
        <div class="panel">
          <div class="panel-title" id="panel-title">Nova planta</div>

          <form id="plant-form">
            <input type="hidden" id="plant-id" />

            <div class="field">
              <label for="f-name">Nome</label>
              <input type="text" id="f-name" placeholder="ex: Samambaia" required />
            </div>

            <div class="field">
              <label for="f-species">Espécie <span style="color:var(--muted);font-weight:300">(opcional)</span></label>
              <input type="text" id="f-species" placeholder="ex: Nephrolepis exaltata" />
            </div>

            <div class="row-2">
              <div class="field">
                <label for="f-location">Ambiente</label>
                <select id="f-location">
                  <option value="interno">Interno</option>
                  <option value="externo">Externo</option>
                  <option value="varanda">Varanda</option>
                  <option value="horta">Horta</option>
                </select>
              </div>

              <div class="field">
                <label for="f-status">Status</label>
                <select id="f-status">
                  <option value="saudavel">Saudável</option>
                  <option value="precisando-de-cuidado">Precisando de cuidado</option>
                  <option value="dormindo">Dormindo</option>
                  <option value="falecida">Falecida</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="f-acquired">Data de aquisição</label>
              <input type="date" id="f-acquired" />
            </div>

            <div class="field">
              <label for="f-notes">Observações</label>
              <textarea id="f-notes" placeholder="Solo, luz, cuidados especiais…"></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Salvar</button>
              <button type="button" id="btn-cancel" class="btn btn-ghost hidden">Cancelar</button>
            </div>
          </form>
        </div>
      </aside>

      <!-- Lista de plantas -->
      <main>
        <div class="section-header">
          <h2 class="section-title">Canteiro</h2>
        </div>

        <!-- Filtros por status -->
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Todas</button>
          <button class="filter-btn" data-filter="saudavel">Saudáveis</button>
          <button class="filter-btn" data-filter="precisando-de-cuidado">Precisando de cuidado</button>
          <button class="filter-btn" data-filter="dormindo">Dormindo</button>
          <button class="filter-btn" data-filter="falecida">Falecidas</button>
        </div>

        <div class="plants-grid" id="plants-grid">
          <div class="empty"><p>Carregando…</p></div>
        </div>
      </main>

    </div>
  </div>

  <!-- Toast de feedback -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
